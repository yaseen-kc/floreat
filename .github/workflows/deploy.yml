# Floreat continuous deployment.
#
# When you push to `main`, GitHub queues this job. The self-hosted runner that
# lives ON the EC2 instance (see CI-CD Pipeline.md section 5) picks it up and
# runs the committed deploy script against ~/floreat. No SSH keys or secrets are
# needed because the runner is already on the server.

name: Deploy to EC2

# Only run on a push to main. Pull requests, other branches, and tags do NOT
# deploy. This is the single most important safety control for a self-hosted
# runner — never widen it to `pull_request` on a public repo.
on:
  push:
    branches: [main]

# Serialize deploys: if a new push arrives while one is still running, the new
# run waits for the current one to finish instead of deploying on top of it.
# We do NOT cancel-in-progress, because interrupting a half-finished deploy
# (mid-build or mid-migration) could leave the server in a broken state.
concurrency:
  group: floreat-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Target our own runner. The labels must match what the runner registered
    # with (the defaults include `self-hosted` and `linux`).
    runs-on: [self-hosted, linux]

    steps:
      - name: Run deploy script on the server
        # The runner executes shell commands directly on the EC2 host, so we
        # just call the version-controlled script. It performs its own
        # git pull, so we intentionally do NOT use actions/checkout here.
        run: bash /home/ubuntu/floreat/scripts/deploy.sh
